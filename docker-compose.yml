services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiragana-web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev"
    stdin_open: true
    tty: true
